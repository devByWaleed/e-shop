<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#FF6584;stop-opacity:1" />
            </linearGradient>
        </defs>
        <!-- Rounded square background -->
        <rect width="100" height="100" rx="22" ry="22" fill="url(#grad)" />
        <!-- Z letter stylized -->
        <polyline points="25,28 75,28 25,72 75,72" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"
            stroke-linejoin="round" />
        <!-- Small dot accent -->
        <circle cx="75" cy="72" r="5" fill="#645ec7" />
    </svg>